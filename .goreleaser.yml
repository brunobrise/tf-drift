version: 2
project_name: tf-drift

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/tf-drift
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    # this name template makes the windows archives end in .zip
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  target_commitish: "{{ .Commit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: tf-drift
    repository:
      owner: brunobrise
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/brunobrise/tf-drift"
    description: "Terraform/OpenTofu drift scanner for layered workspaces."
    license: "MIT"
    install: |
      bin.install "tf-drift"
    test: |
      system "#{bin}/tf-drift -version"
